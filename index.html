<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>피카츄 소개</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fffbe6;
      color: #222;
      margin: 0;
      padding: 0;
      transition: background 0.3s, color 0.3s;
    }
    body.dark {
      background: #1a1a1a;
      color: #f0f0f0;
    }
    header {
      background: #ffd54f;
      padding: 20px;
      text-align: center;
      position: relative;
      transition: background 0.3s;
    }
    body.dark header {
      background: #333;
    }
    .theme-toggle {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      padding: 8px 16px;
      background: #fff;
      border: 2px solid #ffb300;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }
    body.dark .theme-toggle {
      background: #555;
      border-color: #aaa;
      color: #f0f0f0;
    }
    .theme-toggle:hover {
      background: #ffb300;
      color: #fff;
    }
    body.dark .theme-toggle:hover {
      background: #888;
    }
    main {
      max-width: 800px;
      margin: 30px auto;
      padding: 20px;
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: background 0.3s, box-shadow 0.3s;
    }
    body.dark main {
      background: #2c2c2c;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .image-box {
      text-align: center;
      margin-bottom: 20px;
    }
    .image-box div {
      width: 200px;
      height: 200px;
      margin: 0 auto;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff9c4, #ffeb3b, #fbc02d);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    button {
      display: block;
      margin: 25px auto;
      padding: 12px 20px;
      background: #ffca28;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #ffb300;
    }
    footer {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      color: #666;
      transition: color 0.3s;
    }
    body.dark footer {
      color: #aaa;
    }
  </style>
</head>
<body>
  <header>
    <h1>피카츄 소개 페이지</h1>
    <button class="theme-toggle" onclick="toggleTheme()">🌙 다크모드</button>
  </header>

  <main>
    <section class="image-box">
      <div>⚡</div>
      <p>귀여운 전기 포켓몬, 피카츄!</p>
    </section>

    <section>
      <h2>피카츄란?</h2>
      <p>
        피카츄는 포켓몬스터 시리즈에 등장하는 대표적인 전기 타입 포켓몬으로,
        노란색 몸과 귀여운 외모, 그리고 전기를 다루는 능력으로 전 세계적으로 사랑받고 있습니다.
      </p>
    </section>

    <button onclick="location.href='pikachu.html'">
      피카츄 사진 보러가기
    </button>
  </main>

  <footer>
    © 2026 피카츄 팬 페이지 (예시 HTML)
  </footer>

  <script>
    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark');
      const btn = document.querySelector('.theme-toggle');
      btn.textContent = isDark ? '☀️ 화이트모드' : '🌙 다크모드';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    // 저장된 테마 적용
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
      document.querySelector('.theme-toggle').textContent = '☀️ 화이트모드';
    }
  </script>
</body>
</html>
